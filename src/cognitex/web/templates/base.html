<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cognitex{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #f5f5f5;
            color: #333;
            line-height: 1.4;
        }

        /* Layout */
        .container { max-width: 1400px; margin: 0 auto; padding: 1rem; }

        /* Navigation */
        nav { background: #333; padding: 0.75rem 1rem; }
        nav a { color: #fff; text-decoration: none; margin-right: 1.5rem; font-size: 0.9rem; }
        nav a:hover { text-decoration: underline; }
        nav a.active { font-weight: bold; border-bottom: 2px solid #fff; }

        /* Headers */
        h1 { font-size: 1.5rem; margin-bottom: 1rem; }
        h2 { font-size: 1.2rem; margin-bottom: 0.5rem; color: #555; }

        /* Tables */
        table { width: 100%; border-collapse: collapse; background: #fff; }
        th, td { padding: 0.5rem; text-align: left; border-bottom: 1px solid #eee; }
        th { background: #f9f9f9; font-weight: 600; font-size: 0.85rem; color: #666; }
        tr:hover { background: #fafafa; }

        /* Forms */
        input, select, textarea {
            padding: 0.4rem;
            border: 1px solid #ccc;
            border-radius: 3px;
            font-size: 0.9rem;
        }
        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: #666;
        }
        input[type="text"], textarea { width: 100%; }
        textarea { resize: vertical; min-height: 60px; }

        /* Buttons */
        button, .btn {
            padding: 0.4rem 0.8rem;
            border: none;
            border-radius: 3px;
            cursor: pointer;
            font-size: 0.85rem;
            text-decoration: none;
            display: inline-block;
        }
        .btn-primary { background: #2563eb; color: #fff; }
        .btn-primary:hover { background: #1d4ed8; }
        .btn-secondary { background: #e5e7eb; color: #333; }
        .btn-secondary:hover { background: #d1d5db; }
        .btn-danger { background: #dc2626; color: #fff; }
        .btn-danger:hover { background: #b91c1c; }
        .btn-success { background: #16a34a; color: #fff; }
        .btn-success:hover { background: #15803d; }
        .btn-sm { padding: 0.25rem 0.5rem; font-size: 0.75rem; }

        /* Status badges */
        .badge {
            display: inline-block;
            padding: 0.2rem 0.5rem;
            border-radius: 3px;
            font-size: 0.75rem;
            font-weight: 500;
        }
        .badge-pending { background: #fef3c7; color: #92400e; }
        .badge-in_progress, .badge-active { background: #dbeafe; color: #1e40af; }
        .badge-done, .badge-completed, .badge-achieved { background: #d1fae5; color: #065f46; }
        .badge-planning { background: #f3e8ff; color: #6b21a8; }
        .badge-paused { background: #fee2e2; color: #991b1b; }
        .badge-archived, .badge-abandoned { background: #e5e7eb; color: #374151; }

        /* Priority badges */
        .priority-critical { color: #dc2626; font-weight: bold; }
        .priority-high { color: #ea580c; }
        .priority-medium { color: #2563eb; }
        .priority-low { color: #6b7280; }

        /* Timeframe badges */
        .timeframe-quarterly { background: #fef3c7; color: #92400e; }
        .timeframe-yearly { background: #dbeafe; color: #1e40af; }
        .timeframe-multi_year { background: #f3e8ff; color: #6b21a8; }

        /* Cards */
        .card { background: #fff; border-radius: 5px; padding: 1rem; margin-bottom: 1rem; }
        .card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem; }

        /* Stats */
        .stats { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
        .stat { background: #fff; padding: 1rem; border-radius: 5px; min-width: 150px; }
        .stat-value { font-size: 2rem; font-weight: bold; }
        .stat-label { font-size: 0.85rem; color: #666; }

        /* Filters */
        .filters { display: flex; gap: 0.5rem; margin-bottom: 1rem; align-items: center; flex-wrap: wrap; }
        .filters label { font-size: 0.85rem; color: #666; }

        /* Action buttons in row */
        .actions { white-space: nowrap; }
        .actions button, .actions a { margin-left: 0.25rem; }

        /* Inline editing */
        .edit-form td { padding: 0.25rem; }
        .edit-form input, .edit-form select { font-size: 0.85rem; }

        /* New row form */
        .new-form { background: #f9fafb; }

        /* Description tooltip */
        .desc-preview {
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 0.85rem;
            color: #666;
        }

        /* Links */
        .link { color: #2563eb; text-decoration: none; }
        .link:hover { text-decoration: underline; }

        /* Empty state */
        .empty { text-align: center; padding: 2rem; color: #666; }

        /* HTMX loading indicator */
        .htmx-request { opacity: 0.5; }
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline; }

        /* Keyboard shortcuts hint */
        .shortcuts { font-size: 0.75rem; color: #999; margin-top: 1rem; }

        /* Mode badges */
        .mode-badge {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 600;
        }
        .mode-deep_focus { background: #dbeafe; color: #1e40af; }
        .mode-fragmented { background: #fef3c7; color: #92400e; }
        .mode-overloaded { background: #fee2e2; color: #991b1b; }
        .mode-avoidant { background: #fce7f3; color: #9d174d; }
        .mode-hyperfocus { background: #d1fae5; color: #065f46; }
        .mode-transition { background: #e5e7eb; color: #374151; }

        /* Signal meters */
        .signal-bar {
            width: 100%;
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
        }
        .signal-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s;
        }
        .signal-fill.low { background: #16a34a; }
        .signal-fill.medium { background: #eab308; }
        .signal-fill.high { background: #dc2626; }

        /* Event cards */
        .event-card {
            background: #fff;
            border-left: 4px solid #2563eb;
            padding: 0.75rem 1rem;
            margin-bottom: 0.5rem;
            border-radius: 0 5px 5px 0;
        }
        .event-time { font-size: 0.85rem; color: #666; }
        .event-title { font-weight: 600; margin: 0.25rem 0; }
        .event-attendees { font-size: 0.8rem; color: #888; }

        /* Context pack card */
        .context-pack {
            background: #f9fafb;
            border: 1px solid #e5e7eb;
            border-radius: 5px;
            padding: 1rem;
            margin-top: 0.5rem;
        }
        .context-pack-header { font-weight: 600; margin-bottom: 0.5rem; }
        .context-pack-section { margin-bottom: 0.5rem; }
        .context-pack-section-title { font-size: 0.8rem; color: #666; text-transform: uppercase; }

        /* Search box */
        .search-box {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .search-box input {
            flex: 1;
            padding: 0.6rem 1rem;
            font-size: 1rem;
        }

        /* Document results */
        .doc-result {
            background: #fff;
            padding: 1rem;
            margin-bottom: 0.5rem;
            border-radius: 5px;
            border-left: 3px solid #2563eb;
        }
        .doc-result-title { font-weight: 600; }
        .doc-result-path { font-size: 0.8rem; color: #666; margin: 0.25rem 0; }
        .doc-result-snippet { font-size: 0.9rem; color: #444; }
        .doc-result-topics { margin-top: 0.5rem; }
        .topic-tag {
            display: inline-block;
            background: #e0e7ff;
            color: #3730a3;
            padding: 0.15rem 0.4rem;
            border-radius: 3px;
            font-size: 0.75rem;
            margin-right: 0.25rem;
        }
        .concept-tag {
            display: inline-block;
            background: #fef3c7;
            color: #92400e;
            padding: 0.15rem 0.4rem;
            border-radius: 3px;
            font-size: 0.75rem;
            margin-right: 0.25rem;
        }

        /* Briefing section */
        .briefing-content {
            background: #fff;
            padding: 1.5rem;
            border-radius: 5px;
            white-space: pre-wrap;
            line-height: 1.6;
        }

        /* Two column layout */
        .two-col { display: grid; grid-template-columns: 2fr 1fr; gap: 1rem; }
        @media (max-width: 900px) { .two-col { grid-template-columns: 1fr; } }

        /* People picker styles */
        .people-picker {
            position: relative;
            min-width: 200px;
        }
        .people-picker-input {
            width: 100%;
            padding: 0.3rem 0.5rem;
            font-size: 0.85rem;
        }
        .people-picker-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.25rem;
            margin-bottom: 0.25rem;
        }
        .people-tag {
            display: inline-flex;
            align-items: center;
            background: #dbeafe;
            color: #1e40af;
            padding: 0.15rem 0.4rem;
            border-radius: 3px;
            font-size: 0.75rem;
        }
        .people-tag-remove {
            margin-left: 0.3rem;
            cursor: pointer;
            font-weight: bold;
            opacity: 0.7;
        }
        .people-tag-remove:hover { opacity: 1; }
        .people-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: #fff;
            border: 1px solid #ccc;
            border-radius: 3px;
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .people-dropdown.show { display: block; }
        .people-option {
            padding: 0.5rem;
            cursor: pointer;
            font-size: 0.85rem;
            border-bottom: 1px solid #eee;
        }
        .people-option:hover, .people-option.selected {
            background: #f0f9ff;
        }
        .people-option-name { font-weight: 500; }
        .people-option-email { color: #666; font-size: 0.8rem; }
        .people-add-new {
            padding: 0.5rem;
            background: #f9fafb;
            border-top: 1px solid #ddd;
            font-size: 0.8rem;
            color: #2563eb;
            cursor: pointer;
        }
        .people-add-new:hover { background: #f0f9ff; }
    </style>
</head>
<body>
    <nav>
        <a href="/" {% if request.url.path == "/" %}class="active"{% endif %}>Dashboard</a>
        <a href="/today" {% if "/today" in request.url.path %}class="active"{% endif %}>Today</a>
        <a href="/chat" {% if "/chat" in request.url.path %}class="active"{% endif %}>Chat</a>
        <a href="/tasks" {% if "/tasks" in request.url.path %}class="active"{% endif %}>Tasks</a>
        <a href="/projects" {% if "/projects" in request.url.path %}class="active"{% endif %}>Projects</a>
        <a href="/goals" {% if "/goals" in request.url.path %}class="active"{% endif %}>Goals</a>
        <a href="/documents" {% if "/documents" in request.url.path %}class="active"{% endif %}>Documents</a>
        <a href="/graph" {% if "/graph" in request.url.path %}class="active"{% endif %}>Graph</a>
        <a href="/state" {% if "/state" in request.url.path %}class="active"{% endif %}>State</a>
        <a href="/settings" {% if "/settings" in request.url.path %}class="active"{% endif %} style="float: right;">Settings</a>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script>
    // People Picker Component
    class PeoplePicker {
        constructor(container) {
            this.container = container;
            this.formId = container.dataset.formId;
            this.selected = [];
            this.selectedIndex = -1;

            // Parse initial values
            const initial = container.dataset.initial;
            if (initial) {
                try {
                    this.selected = JSON.parse(initial);
                } catch(e) {}
            }

            this.render();
            this.bindEvents();
        }

        render() {
            this.container.innerHTML = `
                <div class="people-picker-tags"></div>
                <input type="text" class="people-picker-input" placeholder="Type to search people...">
                <div class="people-dropdown"></div>
            `;
            this.tagsEl = this.container.querySelector('.people-picker-tags');
            this.inputEl = this.container.querySelector('.people-picker-input');
            this.dropdownEl = this.container.querySelector('.people-dropdown');

            this.renderTags();
        }

        renderTags() {
            this.tagsEl.innerHTML = this.selected.map((p, i) => `
                <span class="people-tag">
                    ${p.name || p.email}
                    <span class="people-tag-remove" data-index="${i}">&times;</span>
                    <input type="hidden" name="people" value="${p.email}" form="${this.formId}">
                </span>
            `).join('');
        }

        bindEvents() {
            let debounceTimer;

            this.inputEl.addEventListener('input', (e) => {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => this.search(e.target.value), 200);
            });

            this.inputEl.addEventListener('focus', () => {
                if (this.inputEl.value.length >= 2) {
                    this.search(this.inputEl.value);
                }
            });

            this.inputEl.addEventListener('keydown', (e) => {
                const options = this.dropdownEl.querySelectorAll('.people-option');

                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    this.selectedIndex = Math.min(this.selectedIndex + 1, options.length - 1);
                    this.updateSelection(options);
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    this.selectedIndex = Math.max(this.selectedIndex - 1, 0);
                    this.updateSelection(options);
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    if (this.selectedIndex >= 0 && options[this.selectedIndex]) {
                        options[this.selectedIndex].click();
                    } else if (this.inputEl.value.includes('@')) {
                        // Add as new email
                        this.addNew(this.inputEl.value);
                    }
                } else if (e.key === 'Escape') {
                    this.hideDropdown();
                }
            });

            this.tagsEl.addEventListener('click', (e) => {
                if (e.target.classList.contains('people-tag-remove')) {
                    const index = parseInt(e.target.dataset.index);
                    this.selected.splice(index, 1);
                    this.renderTags();
                }
            });

            document.addEventListener('click', (e) => {
                if (!this.container.contains(e.target)) {
                    this.hideDropdown();
                }
            });
        }

        updateSelection(options) {
            options.forEach((opt, i) => {
                opt.classList.toggle('selected', i === this.selectedIndex);
            });
        }

        async search(query) {
            if (query.length < 2) {
                this.hideDropdown();
                return;
            }

            try {
                const resp = await fetch(`/api/people/search?q=${encodeURIComponent(query)}`);
                const results = await resp.json();
                this.showResults(results, query);
            } catch(e) {
                console.error('Search failed:', e);
            }
        }

        showResults(results, query) {
            const selectedEmails = this.selected.map(p => p.email);
            const filtered = results.filter(p => !selectedEmails.includes(p.email));

            let html = filtered.map(p => `
                <div class="people-option" data-email="${p.email}" data-name="${p.name || ''}">
                    <div class="people-option-name">${p.name || '(no name)'}</div>
                    <div class="people-option-email">${p.email}</div>
                </div>
            `).join('');

            // Add "create new" option if query looks like an email
            if (query.includes('@') && !results.some(p => p.email.toLowerCase() === query.toLowerCase())) {
                html += `
                    <div class="people-add-new" data-email="${query}">
                        + Add "${query}" as new contact
                    </div>
                `;
            } else if (filtered.length === 0 && !query.includes('@')) {
                html = `<div class="people-option" style="color:#666;">Type an email to add new contact</div>`;
            }

            this.dropdownEl.innerHTML = html;
            this.dropdownEl.classList.add('show');
            this.selectedIndex = -1;

            // Bind click events
            this.dropdownEl.querySelectorAll('.people-option').forEach(opt => {
                opt.addEventListener('click', () => {
                    const email = opt.dataset.email;
                    const name = opt.dataset.name;
                    if (email) {
                        this.addPerson({ email, name });
                    }
                });
            });

            this.dropdownEl.querySelectorAll('.people-add-new').forEach(opt => {
                opt.addEventListener('click', () => {
                    this.addNew(opt.dataset.email);
                });
            });
        }

        async addNew(email) {
            // Create person in backend
            const formData = new FormData();
            formData.append('email', email);

            try {
                const resp = await fetch('/api/people', {
                    method: 'POST',
                    body: formData
                });
                const person = await resp.json();
                this.addPerson(person);
            } catch(e) {
                console.error('Failed to create person:', e);
                // Add anyway for form submission
                this.addPerson({ email, name: '' });
            }
        }

        addPerson(person) {
            if (!this.selected.some(p => p.email === person.email)) {
                this.selected.push(person);
                this.renderTags();
            }
            this.inputEl.value = '';
            this.hideDropdown();
            this.inputEl.focus();
        }

        hideDropdown() {
            this.dropdownEl.classList.remove('show');
            this.selectedIndex = -1;
        }
    }

    // Initialize all people pickers on page load and after HTMX swaps
    function initPeoplePickers() {
        document.querySelectorAll('.people-picker:not(.initialized)').forEach(el => {
            el.classList.add('initialized');
            new PeoplePicker(el);
        });
    }

    document.addEventListener('DOMContentLoaded', initPeoplePickers);
    document.body.addEventListener('htmx:afterSwap', initPeoplePickers);
    </script>
</body>
</html>
