<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Cognitex{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        :root {
            /* Modern Technical Palette */
            --bg-page: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;

            --primary: #4f46e5;      /* Indigo */
            --primary-hover: #4338ca;
            --primary-light: #e0e7ff;
            --primary-text: #3730a3;

            --success: #10b981;
            --success-bg: #d1fae5;
            --warning: #f59e0b;
            --warning-bg: #fef3c7;
            --danger: #ef4444;
            --danger-bg: #fee2e2;

            --radius: 8px;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);

            --font-sans: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-sans);
            background: var(--bg-page);
            color: var(--text-main);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            font-size: 15px;
        }

        /* Navigation */
        nav {
            background: #1e293b; /* Dark slate */
            padding: 0 2rem;
            height: 60px;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            box-shadow: var(--shadow);
            position: sticky;
            top: 0;
            z-index: 50;
        }

        nav a {
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            height: 100%;
            display: flex;
            align-items: center;
            border-bottom: 2px solid transparent;
            transition: all 0.2s;
        }

        nav a:hover { color: #fff; }

        nav a.active {
            color: #fff;
            border-bottom-color: var(--primary);
        }

        /* Layout */
        .container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 1.5rem;
            padding-bottom: 4rem;
        }

        /* Headers */
        h1 {
            font-size: 1.8rem;
            font-weight: 700;
            margin-bottom: 1.5rem;
            letter-spacing: -0.025em;
            color: #1e293b;
        }
        h2 {
            font-size: 1.1rem;
            font-weight: 600;
            color: #334155;
            margin: 0;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            font-size: 0.85rem;
        }

        /* Cards */
        .card {
            background: var(--bg-card);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            transition: box-shadow 0.2s, transform 0.2s;
        }

        .card:hover {
            box-shadow: var(--shadow);
            transform: translateY(-1px);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.25rem;
            padding-bottom: 0.75rem;
            border-bottom: 1px solid var(--border);
        }

        /* Stats Grid */
        .stats {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat {
            background: var(--bg-card);
            padding: 1.5rem;
            border-radius: var(--radius);
            box-shadow: var(--shadow-sm);
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--primary);
            line-height: 1;
            margin-bottom: 0.5rem;
            font-family: var(--font-mono);
        }

        .stat-label {
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Tables */
        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }

        th {
            background: #f8fafc;
            padding: 0.75rem 1rem;
            text-align: left;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            border-bottom: 1px solid var(--border);
        }

        td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
            vertical-align: middle;
        }

        tr:last-child td { border-bottom: none; }

        tr:hover td {
            background-color: #f8fafc;
        }

        /* Badges */
        .badge {
            display: inline-flex;
            align-items: center;
            padding: 0.15rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .badge-pending { background: #fff7ed; color: #c2410c; border: 1px solid #ffedd5; }
        .badge-in_progress, .badge-active { background: var(--primary-light); color: var(--primary-text); border: 1px solid #c7d2fe; }
        .badge-done, .badge-completed, .badge-achieved { background: var(--success-bg); color: #064e3b; border: 1px solid #a7f3d0; }
        .badge-planning { background: #f3e8ff; color: #6b21a8; border: 1px solid #e9d5ff; }
        .badge-paused { background: var(--danger-bg); color: #991b1b; border: 1px solid #fecaca; }
        .badge-archived, .badge-abandoned { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }

        /* Priority */
        .priority-critical { color: var(--danger); font-weight: 700; }
        .priority-high { color: #ea580c; font-weight: 600; }
        .priority-medium { color: var(--primary); }
        .priority-low { color: var(--text-muted); }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.4rem 1rem;
            border-radius: 6px;
            font-size: 0.85rem;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            border: 1px solid transparent;
            line-height: 1.4;
            gap: 0.5rem;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
            box-shadow: 0 1px 2px rgba(0,0,0,0.1);
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
            transform: translateY(-1px);
        }

        .btn-secondary {
            background-color: #fff;
            color: var(--text-main);
            border-color: var(--border);
            box-shadow: 0 1px 2px rgba(0,0,0,0.05);
        }

        .btn-secondary:hover {
            background-color: #f8fafc;
            border-color: #cbd5e1;
        }

        .btn-danger {
            background-color: #fff;
            color: var(--danger);
            border-color: #fecaca;
        }

        .btn-danger:hover {
            background-color: #fef2f2;
            border-color: var(--danger);
        }

        .btn-success {
            background-color: #fff;
            color: var(--success);
            border-color: #a7f3d0;
        }

        .btn-success:hover {
            background-color: #ecfdf5;
            border-color: var(--success);
        }

        .btn-warning {
            background-color: #fff;
            color: #d97706;
            border-color: #fcd34d;
        }

        .btn-warning:hover {
            background-color: #fffbeb;
            border-color: #d97706;
        }

        /* Dropdown styles */
        .dropdown-menu.show {
            display: block !important;
        }

        .dropdown-item {
            display: block;
            width: 100%;
            padding: 0.4rem 0.75rem;
            font-size: 0.85rem;
            color: var(--text-main);
            background: none;
            border: none;
            text-align: left;
            cursor: pointer;
        }

        .dropdown-item:hover {
            background-color: #f3f4f6;
        }

        .btn-sm {
            padding: 0.25rem 0.6rem;
            font-size: 0.75rem;
        }

        /* Forms */
        input, select, textarea {
            display: block;
            width: 100%;
            padding: 0.5rem 0.75rem;
            font-size: 0.9rem;
            color: var(--text-main);
            background-color: #fff;
            border: 1px solid var(--border);
            border-radius: 6px;
            transition: border-color 0.15s, box-shadow 0.15s;
        }

        input:focus, select:focus, textarea:focus {
            border-color: var(--primary);
            outline: 0;
            box-shadow: 0 0 0 3px rgba(79, 70, 229, 0.1);
        }

        /* Utilities */
        .link { color: var(--primary); text-decoration: none; font-weight: 500; }
        .link:hover { text-decoration: underline; }

        .text-dim { color: var(--text-muted); }
        .text-mono { font-family: var(--font-mono); font-size: 0.85em; }

        .filters {
            background: var(--bg-card);
            padding: 1rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            display: flex;
            gap: 1rem;
            align-items: center;
            flex-wrap: wrap;
            margin-bottom: 1.5rem;
        }

        .two-col {
            display: grid;
            grid-template-columns: 2fr 1fr;
            gap: 1.5rem;
        }

        @media (max-width: 1024px) {
            .two-col { grid-template-columns: 1fr; }
        }

        /* ============================================
           Mobile Responsive Styles
           ============================================ */

        /* Hamburger menu button - hidden on desktop */
        .nav-toggle {
            display: none;
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.5rem;
            line-height: 1;
        }
        .nav-toggle:hover { color: #fff; }

        /* Logo/brand - hidden on desktop (links show instead) */
        .nav-brand {
            display: none;
            color: #fff;
            font-weight: 600;
            font-size: 1.1rem;
            text-decoration: none;
        }

        /* Nav links container - inline on desktop */
        .nav-links {
            display: contents;
        }

        .nav-user {
            display: contents;
        }

        @media (max-width: 768px) {
            /* Show hamburger and brand, hide regular nav links */
            .nav-toggle { display: block; }
            .nav-brand { display: block; }

            nav {
                flex-wrap: wrap;
                padding: 0 1rem;
                height: auto;
                min-height: 50px;
            }

            .nav-brand {
                order: 1;
                padding: 0.75rem 0;
                margin-right: auto;
            }

            .nav-toggle {
                order: 2;
                margin-left: auto;
            }

            .nav-links {
                order: 3;
                display: none;
                width: 100%;
                flex-direction: column;
                background: #1e293b;
                border-top: 1px solid #334155;
                padding: 0.5rem 0;
            }

            .nav-links.open { display: flex; }

            .nav-links a {
                padding: 0.75rem 1rem;
                border-bottom: none;
                border-left: 3px solid transparent;
            }

            .nav-links a.active {
                border-bottom: none;
                border-left-color: var(--primary);
                background: rgba(79, 70, 229, 0.1);
            }

            .nav-links a:hover {
                background: rgba(255,255,255,0.05);
            }

            .nav-user {
                width: 100%;
                padding: 0.75rem 1rem;
                border-top: 1px solid #334155;
                display: flex;
                justify-content: space-between;
                align-items: center;
            }

            /* Container adjustments */
            .container {
                padding: 0 1rem;
                margin: 1rem auto;
            }

            h1 { font-size: 1.4rem; }

            /* Stats grid */
            .stats {
                grid-template-columns: 1fr 1fr;
                gap: 0.75rem;
            }

            .stat { padding: 1rem; }
            .stat-value { font-size: 1.5rem; }

            /* Cards */
            .card { padding: 1rem; }

            /* Tables - horizontal scroll */
            .table-wrapper {
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                margin: 0 -1rem;
                padding: 0 1rem;
            }

            table { min-width: 600px; }

            th, td {
                padding: 0.5rem 0.75rem;
                font-size: 0.8rem;
            }

            /* Buttons */
            .btn { padding: 0.35rem 0.75rem; }
            .btn-sm { padding: 0.2rem 0.5rem; }

            /* Filters */
            .filters {
                flex-direction: column;
                align-items: stretch;
            }

            .filters select, .filters input {
                width: 100%;
            }

            /* Search box */
            .search-box {
                flex-direction: column;
            }

            .search-box input {
                width: 100%;
            }

            /* Actions column */
            .actions {
                display: flex;
                gap: 0.25rem;
            }

            /* Hide less important columns on mobile */
            .hide-mobile { display: none; }
        }

        @media (max-width: 480px) {
            .stats {
                grid-template-columns: 1fr;
            }

            .stat-value { font-size: 1.3rem; }

            .badge { font-size: 0.65rem; padding: 0.1rem 0.4rem; }
        }

        /* Specific Component Styles */
        .event-card {
            border-left: 4px solid var(--primary);
            padding-left: 1rem;
        }

        .doc-result {
            background: #fff;
            padding: 1rem;
            margin-bottom: 0.75rem;
            border-radius: var(--radius);
            border: 1px solid var(--border);
            border-left: 3px solid var(--primary);
            transition: transform 0.2s;
        }

        .doc-result:hover {
            transform: translateX(4px);
        }

        .empty {
            text-align: center;
            padding: 3rem 1rem;
            color: var(--text-muted);
            background: #f8fafc;
            border-radius: var(--radius);
            border: 1px dashed var(--border);
        }

        .shortcuts {
            margin-top: 3rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            font-size: 0.8rem;
            color: var(--text-muted);
            text-align: center;
            font-family: var(--font-mono);
        }

        code {
            font-family: var(--font-mono);
            background: #f1f5f9;
            padding: 0.2em 0.4em;
            border-radius: 4px;
            font-size: 0.85em;
            color: #0f172a;
        }

        /* Mode Badges */
        .mode-badge {
            display: inline-block;
            padding: 0.3rem 0.8rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        .mode-deep_focus { background: #dbeafe; color: #1e40af; border: 1px solid #bfdbfe; }
        .mode-fragmented { background: #fef3c7; color: #92400e; border: 1px solid #fde68a; }
        .mode-overloaded { background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .mode-avoidant { background: #fce7f3; color: #9d174d; border: 1px solid #fbcfe8; }
        .mode-hyperfocus { background: #d1fae5; color: #065f46; border: 1px solid #a7f3d0; }
        .mode-transition { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }

        /* Signal meters */
        .signal-bar {
            width: 100%;
            height: 8px;
            background: #e5e7eb;
            border-radius: 4px;
            overflow: hidden;
        }
        .signal-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.3s;
        }
        .signal-fill.low { background: #16a34a; }
        .signal-fill.medium { background: #eab308; }
        .signal-fill.high { background: #dc2626; }

        /* Event time and attendees */
        .event-time { font-size: 0.85rem; color: var(--text-muted); }
        .event-title { font-weight: 600; margin: 0.25rem 0; }
        .event-attendees { font-size: 0.8rem; color: #888; }

        /* Context pack card */
        .context-pack {
            background: #f9fafb;
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 1rem;
            margin-top: 0.5rem;
        }
        .context-pack-header { font-weight: 600; margin-bottom: 0.5rem; }
        .context-pack-section { margin-bottom: 0.5rem; }
        .context-pack-section-title { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; }

        /* Search box */
        .search-box {
            display: flex;
            gap: 0.5rem;
            margin-bottom: 1rem;
        }
        .search-box input {
            flex: 1;
            padding: 0.6rem 1rem;
            font-size: 1rem;
        }

        /* Document results */
        .doc-result-title { font-weight: 600; }
        .doc-result-path { font-size: 0.8rem; color: var(--text-muted); margin: 0.25rem 0; }
        .doc-result-snippet { font-size: 0.9rem; color: #444; }
        .doc-result-topics { margin-top: 0.5rem; }
        .topic-tag {
            display: inline-block;
            background: var(--primary-light);
            color: var(--primary-text);
            padding: 0.15rem 0.4rem;
            border-radius: 3px;
            font-size: 0.75rem;
            margin-right: 0.25rem;
        }
        .concept-tag {
            display: inline-block;
            background: var(--warning-bg);
            color: #92400e;
            padding: 0.15rem 0.4rem;
            border-radius: 3px;
            font-size: 0.75rem;
            margin-right: 0.25rem;
        }

        /* Briefing section */
        .briefing-content {
            background: var(--bg-card);
            padding: 1.5rem;
            border-radius: var(--radius);
            white-space: pre-wrap;
            line-height: 1.6;
        }

        /* Action buttons in row */
        .actions { white-space: nowrap; }
        .actions button, .actions a { margin-left: 0.25rem; }

        /* Inline editing */
        .edit-form td { padding: 0.25rem; }
        .edit-form input, .edit-form select { font-size: 0.85rem; }

        /* New row form */
        .new-form { background: #f9fafb; }

        /* Description tooltip */
        .desc-preview {
            max-width: 200px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        /* HTMX loading indicator */
        .htmx-request { opacity: 0.5; }
        .htmx-indicator { display: none; }
        .htmx-request .htmx-indicator { display: inline; }

        /* People picker styles */
        .people-picker {
            position: relative;
            min-width: 200px;
        }
        .people-picker-input {
            width: 100%;
            padding: 0.3rem 0.5rem;
            font-size: 0.85rem;
        }
        .people-picker-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.25rem;
            margin-bottom: 0.25rem;
        }
        .people-tag {
            display: inline-flex;
            align-items: center;
            background: var(--primary-light);
            color: var(--primary-text);
            padding: 0.15rem 0.4rem;
            border-radius: 3px;
            font-size: 0.75rem;
        }
        .people-tag-remove {
            margin-left: 0.3rem;
            cursor: pointer;
            font-weight: bold;
            opacity: 0.7;
        }
        .people-tag-remove:hover { opacity: 1; }
        .people-dropdown {
            position: absolute;
            top: 100%;
            left: 0;
            right: 0;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            max-height: 200px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
            box-shadow: var(--shadow);
        }
        .people-dropdown.show { display: block; }
        .people-option {
            padding: 0.5rem;
            cursor: pointer;
            font-size: 0.85rem;
            border-bottom: 1px solid var(--border);
        }
        .people-option:hover, .people-option.selected {
            background: #f0f9ff;
        }
        .people-option-name { font-weight: 500; }
        .people-option-email { color: var(--text-muted); font-size: 0.8rem; }
        .people-add-new {
            padding: 0.5rem;
            background: #f9fafb;
            border-top: 1px solid var(--border);
            font-size: 0.8rem;
            color: var(--primary);
            cursor: pointer;
        }
        .people-add-new:hover { background: #f0f9ff; }

        /* Timeframe badges */
        .timeframe-quarterly { background: var(--warning-bg); color: #92400e; }
        .timeframe-yearly { background: var(--primary-light); color: var(--primary-text); }
        .timeframe-multi_year { background: #f3e8ff; color: #6b21a8; }

        /* Subtasks (expandable task steps) */
        .task-row { cursor: pointer; }
        .task-row:hover { background: #f8fafc; }
        .subtasks-row { background: #f9fafb; }
        .subtasks-row td { padding: 0 !important; width: 100%; }
        .subtasks-container {
            padding: 1rem 1.5rem;
            width: 100%;
            box-sizing: border-box;
        }
        .subtasks-list {
            width: 100%;
            display: block;
        }
        .subtask-item {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.6rem 0.75rem;
            border-bottom: 1px solid #e5e7eb;
            background: #fff;
            border-radius: 4px;
            margin-bottom: 2px;
            width: 100%;
            box-sizing: border-box;
        }
        .subtask-item.dragging { opacity: 0.5; background: #e0e7ff; }
        .subtask-item.drag-over { border-top: 2px solid var(--primary); }
        .drag-handle { cursor: grab; color: #9ca3af; user-select: none; flex-shrink: 0; }
        .drag-handle:active { cursor: grabbing; }
        .subtask-item input[type="checkbox"] {
            flex-shrink: 0;
            width: 18px;
            height: 18px;
            margin: 0;
        }
        .subtask-text {
            flex: 1 1 auto;
            min-width: 0;
            word-wrap: break-word;
        }
        .subtask-text.done { text-decoration: line-through; color: #9ca3af; }
        .subtask-delete {
            background: none;
            border: none;
            color: #dc2626;
            cursor: pointer;
            opacity: 0;
            font-size: 1.1rem;
            padding: 0 0.25rem;
            flex-shrink: 0;
        }
        .subtask-item:hover .subtask-delete { opacity: 1; }
        .subtask-add {
            display: flex;
            gap: 0.5rem;
            margin-top: 0.75rem;
            width: 100%;
            box-sizing: border-box;
        }
        .subtask-add input {
            flex: 1 1 auto;
            min-width: 0;
            padding: 0.5rem 0.75rem;
            border: 1px solid var(--border);
            border-radius: 6px;
        }
        .subtask-add button {
            padding: 0.5rem 1rem;
            background: var(--primary);
            color: #fff;
            border: none;
            border-radius: 6px;
            cursor: pointer;
        }
        .subtask-add button:hover { background: var(--primary-hover); }
        .subtask-count {
            font-size: 0.7rem;
            color: var(--text-muted);
            background: #f1f5f9;
            padding: 0.15rem 0.5rem;
            border-radius: 10px;
            white-space: nowrap;
        }
        .subtask-count.all-done { background: var(--success-bg); color: #065f46; }
        .expand-icon {
            color: #9ca3af;
            font-size: 0.8rem;
            transition: transform 0.2s;
        }
        .task-row.expanded .expand-icon { transform: rotate(90deg); }
    </style>
</head>
<body>
    <nav>
        <a href="/" class="nav-brand">Cognitex</a>
        <button class="nav-toggle" onclick="toggleNav()" aria-label="Toggle navigation">&#9776;</button>
        <div class="nav-links" id="nav-links">
            <a href="/" {% if request.url.path == "/" %}class="active"{% endif %}>Dashboard</a>
            <a href="/today" {% if "/today" in request.url.path %}class="active"{% endif %}>Today</a>
            <a href="/chat" {% if "/chat" in request.url.path %}class="active"{% endif %}>Chat</a>
            <a href="/inbox" {% if "/inbox" in request.url.path %}class="active"{% endif %} style="position: relative;">
                Inbox
                <span id="inbox-badge"
                      hx-get="/api/inbox/count"
                      hx-trigger="load, every 15s"
                      hx-swap="innerHTML"
                      style="position: absolute; top: -5px; right: -8px;"></span>
            </a>
            <a href="/tasks" {% if "/tasks" in request.url.path %}class="active"{% endif %}>Tasks</a>
            <a href="/projects" {% if "/projects" in request.url.path %}class="active"{% endif %}>Projects</a>
            <a href="/goals" {% if "/goals" in request.url.path %}class="active"{% endif %}>Goals</a>
            <a href="/documents" {% if "/documents" in request.url.path %}class="active"{% endif %}>Documents</a>
            <a href="/ideas" {% if "/ideas" in request.url.path %}class="active"{% endif %}>Ideas</a>
            <a href="/graph" {% if "/graph" in request.url.path %}class="active"{% endif %}>Graph</a>
            <a href="/learning" {% if "/learning" in request.url.path %}class="active"{% endif %}>Learning</a>
            <a href="/agent-log" {% if "/agent-log" in request.url.path %}class="active"{% endif %}>Agent Log</a>
            <a href="/settings" {% if "/settings" in request.url.path %}class="active"{% endif %}>Settings</a>
            {% if request.state.user %}
            <div class="nav-user">
                <span style="color: #64748b; font-size: 0.85rem;">{{ request.state.user.email }}</span>
                <a href="/auth/logout" style="color: #ef4444; font-size: 0.85rem;">Logout</a>
            </div>
            {% endif %}
        </div>
    </nav>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <script>
    // Mobile nav toggle
    function toggleNav() {
        const navLinks = document.getElementById('nav-links');
        navLinks.classList.toggle('open');
    }

    // Close nav when clicking a link (mobile)
    document.addEventListener('DOMContentLoaded', function() {
        const navLinks = document.querySelectorAll('.nav-links a');
        navLinks.forEach(link => {
            link.addEventListener('click', () => {
                document.getElementById('nav-links').classList.remove('open');
            });
        });
    });

    // Subtasks expand/collapse
    function toggleSubtasks(taskId, event) {
        // Don't toggle if clicking buttons, inputs, links, or selects
        if (event.target.closest('button, a, input, select, .btn')) return;

        const taskRow = document.getElementById('task-' + taskId);
        const subtasksRow = document.getElementById('subtasks-' + taskId);
        if (!subtasksRow) return;

        const isExpanded = subtasksRow.style.display !== 'none';
        subtasksRow.style.display = isExpanded ? 'none' : 'table-row';
        taskRow.classList.toggle('expanded', !isExpanded);
    }

    // Subtasks drag and drop
    let draggedSubtask = null;

    document.addEventListener('dragstart', (e) => {
        if (e.target.classList.contains('subtask-item')) {
            draggedSubtask = e.target;
            e.target.classList.add('dragging');
            e.dataTransfer.effectAllowed = 'move';
            e.dataTransfer.setData('text/plain', e.target.dataset.id);
        }
    });

    document.addEventListener('dragend', (e) => {
        if (e.target.classList.contains('subtask-item')) {
            e.target.classList.remove('dragging');
            document.querySelectorAll('.subtask-item.drag-over').forEach(el => el.classList.remove('drag-over'));
            draggedSubtask = null;
        }
    });

    document.addEventListener('dragover', (e) => {
        e.preventDefault();
        if (!draggedSubtask) return;

        const list = e.target.closest('.subtasks-list');
        if (!list) return;

        const afterElement = getDragAfterElement(list, e.clientY);
        if (afterElement) {
            list.insertBefore(draggedSubtask, afterElement);
        } else {
            const addForm = list.querySelector('.subtask-add');
            list.insertBefore(draggedSubtask, addForm);
        }
    });

    function getDragAfterElement(list, y) {
        const draggableElements = [...list.querySelectorAll('.subtask-item:not(.dragging)')];
        return draggableElements.reduce((closest, child) => {
            const box = child.getBoundingClientRect();
            const offset = y - box.top - box.height / 2;
            if (offset < 0 && offset > closest.offset) {
                return { offset: offset, element: child };
            } else {
                return closest;
            }
        }, { offset: Number.NEGATIVE_INFINITY }).element;
    }

    document.addEventListener('drop', async (e) => {
        e.preventDefault();
        if (!draggedSubtask) return;

        const list = e.target.closest('.subtasks-list');
        if (!list) return;

        const taskId = list.dataset.taskId;
        const orderedIds = [...list.querySelectorAll('.subtask-item')].map(el => el.dataset.id);

        await fetch(`/tasks/${taskId}/subtasks/reorder`, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify({order: orderedIds})
        });
    });

    // People Picker Component
    class PeoplePicker {
        constructor(container) {
            this.container = container;
            this.formId = container.dataset.formId;
            this.selected = [];
            this.selectedIndex = -1;

            // Parse initial values
            const initial = container.dataset.initial;
            if (initial) {
                try {
                    this.selected = JSON.parse(initial);
                } catch(e) {}
            }

            this.render();
            this.bindEvents();
        }

        render() {
            this.container.innerHTML = `
                <div class="people-picker-tags"></div>
                <input type="text" class="people-picker-input" placeholder="Type to search people...">
                <div class="people-dropdown"></div>
            `;
            this.tagsEl = this.container.querySelector('.people-picker-tags');
            this.inputEl = this.container.querySelector('.people-picker-input');
            this.dropdownEl = this.container.querySelector('.people-dropdown');

            this.renderTags();
        }

        renderTags() {
            this.tagsEl.innerHTML = this.selected.map((p, i) => `
                <span class="people-tag">
                    ${p.name || p.email}
                    <span class="people-tag-remove" data-index="${i}">&times;</span>
                    <input type="hidden" name="people" value="${p.email}" form="${this.formId}">
                </span>
            `).join('');
        }

        bindEvents() {
            let debounceTimer;

            this.inputEl.addEventListener('input', (e) => {
                clearTimeout(debounceTimer);
                debounceTimer = setTimeout(() => this.search(e.target.value), 200);
            });

            this.inputEl.addEventListener('focus', () => {
                if (this.inputEl.value.length >= 2) {
                    this.search(this.inputEl.value);
                }
            });

            this.inputEl.addEventListener('keydown', (e) => {
                const options = this.dropdownEl.querySelectorAll('.people-option');

                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    this.selectedIndex = Math.min(this.selectedIndex + 1, options.length - 1);
                    this.updateSelection(options);
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    this.selectedIndex = Math.max(this.selectedIndex - 1, 0);
                    this.updateSelection(options);
                } else if (e.key === 'Enter') {
                    e.preventDefault();
                    if (this.selectedIndex >= 0 && options[this.selectedIndex]) {
                        options[this.selectedIndex].click();
                    } else if (this.inputEl.value.includes('@')) {
                        // Add as new email
                        this.addNew(this.inputEl.value);
                    }
                } else if (e.key === 'Escape') {
                    this.hideDropdown();
                }
            });

            this.tagsEl.addEventListener('click', (e) => {
                if (e.target.classList.contains('people-tag-remove')) {
                    const index = parseInt(e.target.dataset.index);
                    this.selected.splice(index, 1);
                    this.renderTags();
                }
            });

            document.addEventListener('click', (e) => {
                if (!this.container.contains(e.target)) {
                    this.hideDropdown();
                }
            });
        }

        updateSelection(options) {
            options.forEach((opt, i) => {
                opt.classList.toggle('selected', i === this.selectedIndex);
            });
        }

        async search(query) {
            if (query.length < 2) {
                this.hideDropdown();
                return;
            }

            try {
                const resp = await fetch(`/api/people/search?q=${encodeURIComponent(query)}`);
                const results = await resp.json();
                this.showResults(results, query);
            } catch(e) {
                console.error('Search failed:', e);
            }
        }

        showResults(results, query) {
            const selectedEmails = this.selected.map(p => p.email);
            const filtered = results.filter(p => !selectedEmails.includes(p.email));

            let html = filtered.map(p => `
                <div class="people-option" data-email="${p.email}" data-name="${p.name || ''}">
                    <div class="people-option-name">${p.name || '(no name)'}</div>
                    <div class="people-option-email">${p.email}</div>
                </div>
            `).join('');

            // Add "create new" option if query looks like an email
            if (query.includes('@') && !results.some(p => p.email.toLowerCase() === query.toLowerCase())) {
                html += `
                    <div class="people-add-new" data-email="${query}">
                        + Add "${query}" as new contact
                    </div>
                `;
            } else if (filtered.length === 0 && !query.includes('@')) {
                html = `<div class="people-option" style="color:#666;">Type an email to add new contact</div>`;
            }

            this.dropdownEl.innerHTML = html;
            this.dropdownEl.classList.add('show');
            this.selectedIndex = -1;

            // Bind click events
            this.dropdownEl.querySelectorAll('.people-option').forEach(opt => {
                opt.addEventListener('click', () => {
                    const email = opt.dataset.email;
                    const name = opt.dataset.name;
                    if (email) {
                        this.addPerson({ email, name });
                    }
                });
            });

            this.dropdownEl.querySelectorAll('.people-add-new').forEach(opt => {
                opt.addEventListener('click', () => {
                    this.addNew(opt.dataset.email);
                });
            });
        }

        async addNew(email) {
            // Create person in backend
            const formData = new FormData();
            formData.append('email', email);

            try {
                const resp = await fetch('/api/people', {
                    method: 'POST',
                    body: formData
                });
                const person = await resp.json();
                this.addPerson(person);
            } catch(e) {
                console.error('Failed to create person:', e);
                // Add anyway for form submission
                this.addPerson({ email, name: '' });
            }
        }

        addPerson(person) {
            if (!this.selected.some(p => p.email === person.email)) {
                this.selected.push(person);
                this.renderTags();
            }
            this.inputEl.value = '';
            this.hideDropdown();
            this.inputEl.focus();
        }

        hideDropdown() {
            this.dropdownEl.classList.remove('show');
            this.selectedIndex = -1;
        }
    }

    // Initialize all people pickers on page load and after HTMX swaps
    function initPeoplePickers() {
        document.querySelectorAll('.people-picker:not(.initialized)').forEach(el => {
            el.classList.add('initialized');
            new PeoplePicker(el);
        });
    }

    document.addEventListener('DOMContentLoaded', initPeoplePickers);
    document.body.addEventListener('htmx:afterSwap', initPeoplePickers);

    // Task rejection feedback - two-stage UI
    function selectTaskRejectReason(taskId, reason, label) {
        // Hide the reason selection, show the feedback prompt
        document.getElementById('task-reason-select-' + taskId).style.display = 'none';
        document.getElementById('task-feedback-prompt-' + taskId).style.display = 'block';
        document.getElementById('task-reason-' + taskId).value = reason;
        document.getElementById('task-reason-label-' + taskId).textContent = label;
    }

    // Close dropdowns when clicking outside
    document.addEventListener('click', function(e) {
        if (!e.target.closest('.dropdown')) {
            document.querySelectorAll('.dropdown-menu.show').forEach(menu => {
                menu.classList.remove('show');
            });
        }
    });
    </script>

    <!-- Scratch Pad Panel (loads via HTMX) -->
    {% if show_scratch_pad is not defined or show_scratch_pad %}
    <div hx-get="/api/scratch/panel"
         hx-trigger="load"
         hx-swap="innerHTML"
         id="scratch-panel-container">
    </div>
    {% endif %}
</body>
</html>
