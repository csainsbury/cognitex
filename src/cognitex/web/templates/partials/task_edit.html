<tr id="task-{{ task.id }}" class="edit-form">
    <td>
        <form id="task-edit-{{ task.id }}" hx-post="/tasks/{{ task.id }}" hx-target="#task-{{ task.id }}" hx-swap="outerHTML" hx-include="[form='task-edit-{{ task.id }}']">
            <input type="text" name="title" value="{{ task.title }}" required>
            <textarea name="description" placeholder="Description (optional)">{{ task.description or '' }}</textarea>
        </form>
    </td>
    <td>
        <select name="priority" form="task-edit-{{ task.id }}">
            <option value="low" {% if task.priority == 'low' %}selected{% endif %}>low</option>
            <option value="medium" {% if task.priority == 'medium' %}selected{% endif %}>medium</option>
            <option value="high" {% if task.priority == 'high' %}selected{% endif %}>high</option>
            <option value="critical" {% if task.priority == 'critical' %}selected{% endif %}>critical</option>
        </select>
    </td>
    <td>
        <select name="status" form="task-edit-{{ task.id }}">
            <option value="pending" {% if task.status == 'pending' %}selected{% endif %}>pending</option>
            <option value="in_progress" {% if task.status == 'in_progress' %}selected{% endif %}>in_progress</option>
            <option value="done" {% if task.status == 'done' %}selected{% endif %}>done</option>
        </select>
    </td>
    <td>
        <input type="date" name="due_date" value="{{ task.due[:10] if task.due else '' }}" form="task-edit-{{ task.id }}">
    </td>
    <td>{{ task.project or '-' }}</td>
    <td colspan="2">
        <div class="people-picker" data-form-id="task-edit-{{ task.id }}" data-initial='{{ task.people_full | default([]) | tojson }}'></div>
    </td>
    <td class="actions">
        <button type="submit" form="task-edit-{{ task.id }}" class="btn btn-primary btn-sm">Save</button>
        <button type="button" class="btn btn-secondary btn-sm"
                hx-get="/tasks/{{ task.id }}/row"
                hx-target="#task-{{ task.id }}"
                hx-swap="outerHTML">Cancel</button>
    </td>
</tr>
