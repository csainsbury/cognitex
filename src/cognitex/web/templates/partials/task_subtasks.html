<div class="subtasks-list" id="subtasks-list-{{ task_id }}" data-task-id="{{ task_id }}">
    {% for step in subtasks %}
    <div class="subtask-item" draggable="true" data-id="{{ step.id }}">
        <span class="drag-handle">⋮⋮</span>
        <input type="checkbox"
               {% if step.done %}checked{% endif %}
               hx-post="/tasks/{{ task_id }}/subtasks/{{ step.id }}/toggle"
               hx-target="#subtasks-list-{{ task_id }}"
               hx-swap="outerHTML"
               onclick="event.stopPropagation()">
        <span class="subtask-text {% if step.done %}done{% endif %}">{{ step.text }}</span>
        <button class="subtask-delete"
                hx-delete="/tasks/{{ task_id }}/subtasks/{{ step.id }}"
                hx-target="#subtasks-list-{{ task_id }}"
                hx-swap="outerHTML"
                hx-confirm="Delete this step?"
                onclick="event.stopPropagation()">&times;</button>
    </div>
    {% endfor %}

    {% if subtasks|length == 0 %}
    <div style="color: var(--text-muted); font-size: 0.9rem; padding: 0.5rem 0;">
        No steps yet. Add steps to break down this task.
    </div>
    {% endif %}

    <form class="subtask-add"
          hx-post="/tasks/{{ task_id }}/subtasks"
          hx-target="#subtasks-list-{{ task_id }}"
          hx-swap="outerHTML"
          onclick="event.stopPropagation()">
        <input type="text" name="text" placeholder="Add a step..." autocomplete="off" required>
        <button type="submit">Add</button>
    </form>
</div>
