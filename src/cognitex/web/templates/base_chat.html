<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Erdos - Cognitex{% endblock %}</title>
    <script src="https://unpkg.com/htmx.org@1.9.10"></script>
    <style>
        :root {
            --bg-page: #f8fafc;
            --bg-card: #ffffff;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --primary: #4f46e5;
            --primary-hover: #4338ca;
            --primary-light: #e0e7ff;
            --primary-text: #3730a3;
            --success: #10b981;
            --success-bg: #d1fae5;
            --warning: #f59e0b;
            --warning-bg: #fef3c7;
            --danger: #ef4444;
            --danger-bg: #fee2e2;
            --radius: 8px;
            --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
            --shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
            --font-sans: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            --font-mono: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: var(--font-sans);
            background: var(--bg-page);
            color: var(--text-main);
            line-height: 1.5;
            -webkit-font-smoothing: antialiased;
            font-size: 15px;
            overflow: hidden;
            height: 100vh;
        }

        /* Top Bar */
        .topbar {
            background: #1e293b;
            height: 56px;
            display: flex;
            align-items: center;
            padding: 0 1rem;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            z-index: 100;
            box-shadow: var(--shadow);
        }
        .topbar-hamburger {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 1.4rem;
            cursor: pointer;
            padding: 0.5rem;
            line-height: 1;
            border-radius: 6px;
        }
        .topbar-hamburger:hover { color: #fff; background: rgba(255,255,255,0.08); }
        .topbar-brand {
            color: #fff;
            font-weight: 700;
            font-size: 1.1rem;
            text-decoration: none;
            margin-left: 0.75rem;
        }
        .topbar-brand:hover { color: #e0e7ff; }
        .topbar-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }
        .topbar-inbox {
            color: #94a3b8;
            position: relative;
            display: flex;
            align-items: center;
            text-decoration: none;
            padding: 0.4rem;
            border-radius: 6px;
        }
        .topbar-inbox:hover { color: #fff; background: rgba(255,255,255,0.08); }
        #topbar-inbox-badge {
            position: absolute;
            top: 0;
            right: -2px;
        }
        .topbar-logout {
            color: #94a3b8;
            display: flex;
            align-items: center;
            padding: 0.4rem;
            border-radius: 6px;
            text-decoration: none;
        }
        .topbar-logout:hover { color: #ef4444; background: rgba(255,255,255,0.08); }

        /* Drawer (same as base.html) */
        .drawer-backdrop {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.4);
            z-index: 199;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.25s, visibility 0.25s;
        }
        body.drawer-open .drawer-backdrop {
            opacity: 1;
            visibility: visible;
        }
        .nav-drawer {
            position: fixed;
            top: 0;
            left: 0;
            width: 280px;
            height: 100vh;
            background: #1e293b;
            z-index: 200;
            transform: translateX(-100%);
            transition: transform 0.25s ease;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
        }
        body.drawer-open .nav-drawer {
            transform: translateX(0);
        }
        .drawer-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.25rem;
            border-bottom: 1px solid #334155;
        }
        .drawer-brand {
            color: #fff;
            font-weight: 700;
            font-size: 1.15rem;
        }
        .drawer-close {
            background: none;
            border: none;
            color: #94a3b8;
            font-size: 1.5rem;
            cursor: pointer;
            padding: 0.25rem 0.5rem;
            line-height: 1;
            border-radius: 4px;
        }
        .drawer-close:hover { color: #fff; background: rgba(255,255,255,0.08); }
        .drawer-section {
            padding: 0.5rem 0;
            border-bottom: 1px solid #334155;
        }
        .drawer-section:last-of-type { border-bottom: none; }
        .drawer-group-label {
            padding: 0.5rem 1.25rem 0.25rem;
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: #64748b;
        }
        .drawer-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.55rem 1.25rem;
            color: #94a3b8;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: background 0.15s, color 0.15s;
            border-left: 3px solid transparent;
        }
        .drawer-link:hover {
            background: rgba(255,255,255,0.05);
            color: #e2e8f0;
        }
        .drawer-link.active {
            color: #fff;
            background: rgba(79, 70, 229, 0.15);
            border-left-color: var(--primary);
        }
        .drawer-link svg { flex-shrink: 0; }
        .drawer-badge { margin-left: auto; }
        .drawer-footer {
            margin-top: auto;
            padding: 0.75rem 1.25rem;
            border-top: 1px solid #334155;
        }
        .drawer-user-email {
            color: #64748b;
            font-size: 0.8rem;
            word-break: break-all;
        }

        /* Split View Layout */
        .chat-layout {
            display: flex;
            height: calc(100vh - 56px);
            margin-top: 56px;
        }
        .chat-main {
            flex: 1;
            min-width: 0;
            display: flex;
            flex-direction: column;
        }
        .chat-sidebar {
            width: 340px;
            border-left: 1px solid var(--border);
            background: var(--bg-page);
            overflow-y: auto;
            flex-shrink: 0;
            transition: width 0.2s, opacity 0.2s;
        }
        .chat-sidebar.collapsed {
            width: 0;
            overflow: hidden;
            border-left: none;
            opacity: 0;
        }
        .chat-sidebar-inner {
            padding: 1rem;
        }

        /* Sidebar sections */
        .sidebar-section {
            margin-bottom: 1rem;
        }
        .sidebar-section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 0.5rem;
        }
        .sidebar-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-muted);
        }
        .sidebar-link {
            font-size: 0.75rem;
            color: var(--primary);
            text-decoration: none;
        }
        .sidebar-link:hover { text-decoration: underline; }
        .sidebar-item {
            padding: 0.5rem 0.6rem;
            border-radius: 6px;
            margin-bottom: 0.35rem;
            display: flex;
            flex-direction: column;
            gap: 0.15rem;
        }
        .sidebar-item-danger {
            background: var(--danger-bg);
        }
        .sidebar-item-warning {
            background: var(--warning-bg);
        }
        .sidebar-item-badge {
            font-size: 0.65rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.03em;
        }
        .badge-danger { color: var(--danger); }
        .badge-warning { color: #b45309; }
        .sidebar-item-text {
            font-size: 0.85rem;
            color: var(--text-main);
        }
        .sidebar-item-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
        }
        .sidebar-empty {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-style: italic;
            padding: 0.25rem 0;
        }
        .sidebar-meeting-card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 0.75rem;
        }
        .sidebar-meeting-title {
            font-size: 0.9rem;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 0.25rem;
        }
        .sidebar-meeting-time {
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .sidebar-meeting-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
            margin-top: 0.25rem;
        }
        .sidebar-meeting-pack {
            display: inline-block;
            margin-top: 0.35rem;
            font-size: 0.75rem;
            color: var(--primary);
            text-decoration: none;
        }
        .sidebar-meeting-pack:hover { text-decoration: underline; }
        .sidebar-mode {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }
        .mode-badge {
            display: inline-block;
            padding: 0.25rem 0.6rem;
            border-radius: 12px;
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: capitalize;
        }
        .mode-deep_focus { background: #dbeafe; color: #1e40af; }
        .mode-fragmented { background: #fef3c7; color: #b45309; }
        .mode-overloaded { background: var(--danger-bg); color: #b91c1c; }
        .mode-avoidant { background: #f3e8ff; color: #7c3aed; }
        .mode-hyperfocus { background: #d1fae5; color: #065f46; }
        .mode-transition { background: #f1f5f9; color: #475569; }
        .sidebar-mode-notes {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        /* Sidebar toggle button */
        .sidebar-toggle {
            background: none;
            border: none;
            color: var(--text-muted);
            cursor: pointer;
            padding: 0.4rem;
            border-radius: 4px;
            display: flex;
            align-items: center;
        }
        .sidebar-toggle:hover { background: #f1f5f9; color: var(--text-main); }

        @media (max-width: 768px) {
            .nav-drawer { width: 260px; }
            .chat-sidebar { display: none; }
        }
    </style>
</head>
<body>
    {% include "partials/nav_drawer.html" %}

    <div class="chat-layout">
        <div class="chat-main">
            {% block chat_content %}{% endblock %}
        </div>
        <div class="chat-sidebar" id="chat-sidebar">
            <div class="chat-sidebar-inner">
                {% block sidebar_content %}{% endblock %}
            </div>
        </div>
    </div>

    {% block scripts %}{% endblock %}
</body>
</html>
