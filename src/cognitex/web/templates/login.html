{% extends "base.html" %}

{% block title %}Login - Cognitex{% endblock %}

{% block content %}
<div style="max-width: 400px; margin: 4rem auto; text-align: center;">
    <div class="card" style="padding: 2.5rem;">
        <h1 style="margin-bottom: 0.5rem; font-size: 2rem;">Cognitex</h1>
        <p style="color: var(--text-muted); margin-bottom: 2rem; font-size: 0.9rem;">
            Personal cognitive assistant
        </p>

        {% if error %}
        <div style="background: var(--danger-bg); color: var(--danger); padding: 1rem; border-radius: var(--radius); margin-bottom: 1.5rem; font-size: 0.9rem;">
            {{ error }}
        </div>
        {% endif %}

        <a href="/auth/google{% if next %}?next={{ next }}{% endif %}" class="btn btn-primary" style="width: 100%; padding: 0.75rem; font-size: 1rem;">
            <svg style="width: 20px; height: 20px; margin-right: 0.5rem; vertical-align: middle;" viewBox="0 0 24 24">
                <path fill="currentColor" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                <path fill="currentColor" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                <path fill="currentColor" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                <path fill="currentColor" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
            </svg>
            Sign in with Google
        </a>

        <p style="color: var(--text-muted); font-size: 0.8rem; margin-top: 2rem;">
            Access is by invitation only.
        </p>
    </div>
</div>
{% endblock %}
